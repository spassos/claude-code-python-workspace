name: Deploy to Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual deploy"
        required: false
        default: "Manual trigger"

concurrency:
  group: deploy-production
  cancel-in-progress: false  # Never cancel an in-flight deploy

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: ${{ secrets.GCP_REGION }}
  GCP_SERVICE_NAME: ${{ secrets.GCP_SERVICE_NAME }}
  GCP_ARTIFACT_REGISTRY: ${{ secrets.GCP_ARTIFACT_REGISTRY }}
  IMAGE_NAME: ${{ secrets.GCP_SERVICE_NAME }}

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Set image tag
        id: image
        run: |
          SHA_SHORT="${GITHUB_SHA::8}"
          IMAGE="${{ env.GCP_ARTIFACT_REGISTRY }}/${{ env.IMAGE_NAME }}"
          echo "tag=${IMAGE}:${SHA_SHORT}" >> $GITHUB_OUTPUT
          echo "latest=${IMAGE}:latest" >> $GITHUB_OUTPUT
          echo "sha=${SHA_SHORT}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build \
            --target production \
            --tag "${{ steps.image.outputs.tag }}" \
            --tag "${{ steps.image.outputs.latest }}" \
            --label "git.sha=${{ github.sha }}" \
            --label "git.ref=${{ github.ref }}" \
            --label "build.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            .

      - name: Push Docker image
        run: |
          docker push "${{ steps.image.outputs.tag }}"
          docker push "${{ steps.image.outputs.latest }}"

      - name: Deploy to Cloud Run
        id: deploy
        run: |
          gcloud run deploy "${{ env.GCP_SERVICE_NAME }}" \
            --image "${{ steps.image.outputs.tag }}" \
            --region "${{ env.GCP_REGION }}" \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --min-instances 0 \
            --max-instances 10 \
            --memory 512Mi \
            --cpu 1 \
            --timeout 60 \
            --concurrency 80 \
            --set-env-vars "GCP_PROJECT_ID=${{ env.GCP_PROJECT_ID }},GCP_REGION=${{ env.GCP_REGION }}" \
            --quiet

          # Get the service URL
          URL=$(gcloud run services describe "${{ env.GCP_SERVICE_NAME }}" \
            --region "${{ env.GCP_REGION }}" \
            --format "value(status.url)")
          echo "url=${URL}" >> $GITHUB_OUTPUT

      - name: Verify health check
        run: |
          URL="${{ steps.deploy.outputs.url }}"
          echo "Checking health at ${URL}/health"

          for i in {1..5}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${URL}/health")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (HTTP 200)"
              break
            fi
            echo "Attempt $i: HTTP $STATUS — retrying in 5s..."
            sleep 5
          done

          if [ "$STATUS" != "200" ]; then
            echo "Health check failed after 5 attempts"
            exit 1
          fi

      - name: Output service URL
        run: |
          echo "### Deploy Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Service**: ${{ env.GCP_SERVICE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "**URL**: ${{ steps.deploy.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Image**: ${{ steps.image.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
